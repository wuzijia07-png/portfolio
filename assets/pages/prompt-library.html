<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI提示词模板库 · 跨境电商运营</title>
<style>
:root {
  --bg:#fafaf9; --surface:#fff; --border:#e8e6e1; --text:#1a1a18;
  --text2:#6b6b63; --text3:#9a9992; --gold:#b8943e; --gold-light:#f5ecd7;
  --radius:10px; --shadow:0 2px 16px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s}
.container{max-width:900px;margin:0 auto;padding:40px 24px;transition:max-width .3s, padding .3s}

/* Mobile view */
body.mobile-view{background:#e8e6e1}
body.mobile-view .container{max-width:400px;padding:16px 12px}
body.mobile-view .page-header h1{font-size:22px}
body.mobile-view .category-tabs{gap:4px}
body.mobile-view .cat-tab{padding:6px 12px;font-size:12px}
body.mobile-view .prompt-content{max-height:160px;font-size:12px}

/* Toolbar */
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;padding:12px 20px;pointer-events:none}
.toolbar button,.toolbar .tb-btn{pointer-events:auto}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.2s;font-family:inherit;box-shadow:var(--shadow);text-decoration:none}
.tb-btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.tb-btn.add-btn{background:var(--gold);color:#fff;border-color:var(--gold)}
.tb-btn.add-btn:hover{background:#a07d2e}
.tb-btn .icon{font-size:18px}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:var(--surface);border-radius:var(--radius);width:90vw;max-width:600px;max-height:85vh;box-shadow:0 16px 48px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:700}
.modal-header button{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
.modal-header button:hover{background:var(--text);color:#fff}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-body label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px;margin-top:14px;text-transform:uppercase;letter-spacing:.04em}
.modal-body label:first-child{margin-top:0}
.modal-body input,.modal-body select,.modal-body textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);transition:.2s;resize:vertical}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-light)}
.modal-body textarea{min-height:180px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;line-height:1.6}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.modal-footer button{padding:8px 20px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-cancel{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-cancel:hover{background:var(--border)}
.btn-save{background:var(--gold);color:#fff;border:none}
.btn-save:hover{background:#a07d2e}

/* Delete btn on custom cards */
.del-btn{position:absolute;top:8px;right:72px;padding:4px 10px;border-radius:100px;border:1px solid #e0cccc;background:#fff5f5;font-size:11px;color:#c04040;cursor:pointer;transition:.2s;font-family:inherit}
.del-btn:hover{background:#c04040;color:#fff;border-color:#c04040}

/* Custom badge */
.custom-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:100px;background:#e8f0e0;color:#3d7d4a;font-weight:600;margin-left:6px}

/* Page header */
.page-header{text-align:center;margin-bottom:36px;padding-top:20px;position:relative}
.page-header .icon{font-size:40px;margin-bottom:8px}
.page-header h1{font-size:28px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px}
.page-header p{font-size:14px;color:var(--text2)}

.category-tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.cat-tab{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:.2s;font-family:inherit}
.cat-tab:hover,.cat-tab.active{background:var(--text);color:#fff;border-color:var(--text)}

.prompt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:12px;box-shadow:var(--shadow);transition:.2s}
.prompt-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.06)}
.prompt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.prompt-title{font-size:15px;font-weight:700}
.prompt-scene{font-size:11px;padding:3px 10px;border-radius:100px;background:var(--gold-light);color:var(--gold);font-weight:600}
.prompt-desc{font-size:13px;color:var(--text2);margin-bottom:12px}
.prompt-content{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-size:13px;color:var(--text);white-space:pre-wrap;font-family:'Cascadia Code','Fira Code','Consolas',monospace;line-height:1.7;max-height:200px;overflow-y:auto;position:relative}
.prompt-content::-webkit-scrollbar{width:4px}
.prompt-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--text2);cursor:pointer;transition:.2s;font-family:inherit}
.copy-btn:hover{background:var(--text);color:#fff;border-color:var(--text)}
.copy-btn.copied{background:#3d7d4a;color:#fff;border-color:#3d7d4a}

.prompt-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.ptag{font-size:11px;padding:2px 8px;border-radius:100px;background:#f4f2ee;color:#9a9992}

.page-footer{text-align:center;padding:32px;font-size:12px;color:var(--text3)}
.page-footer a{color:var(--text)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tb-btn" id="toggleView" title="切换手机/桌面视图">📱 手机视图</button>
  <button class="tb-btn add-btn" id="addTemplateBtn"><span class="icon">+</span> 添加模板</button>
</div>

<div class="container">

<div class="page-header">
  <div class="icon">📚</div>
  <h1>AI提示词模板库</h1>
  <p>跨境电商运营场景 · 可复用提示词集合 · 持续沉淀迭代</p>
</div>

<div class="category-tabs" id="catTabs">
  <button class="cat-tab active" data-cat="all">全部</button>
  <button class="cat-tab" data-cat="listing">📦 Listing文案</button>
  <button class="cat-tab" data-cat="data">📊 数据分析</button>
  <button class="cat-tab" data-cat="customer">💬 客户沟通</button>
  <button class="cat-tab" data-cat="research">🔍 竞品调研</button>
  <button class="cat-tab" data-cat="process">⚙️ 流程优化</button>
</div>

<div id="promptList"></div>

<div class="page-footer">
  <p>提示词模板库由 <strong>吴子嘉</strong> 整理沉淀 · AI辅助分类与优化</p>
  <p style="margin-top:4px">模板展示的是提示词工程方法，场景为示例说明</p>
</div>
</div>

<!-- Add Template Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>✏️ 添加自定义模板</h3>
      <button id="closeModal">&times;</button>
    </div>
    <div class="modal-body">
      <label>所属版块</label>
      <select id="tmplCat">
        <option value="listing">📦 Listing文案</option>
        <option value="data">📊 数据分析</option>
        <option value="customer">💬 客户沟通</option>
        <option value="research">🔍 竞品调研</option>
        <option value="process">⚙️ 流程优化</option>
      </select>
      <label>模板标题</label>
      <input type="text" id="tmplTitle" placeholder="例如：产品卖点提炼助手">
      <label>使用场景</label>
      <input type="text" id="tmplScene" placeholder="例如：日常高频 / 优化迭代 / 选品决策">
      <label>模板描述</label>
      <input type="text" id="tmplDesc" placeholder="简要描述这个模板的用途…">
      <label>模板内容</label>
      <textarea id="tmplContent" placeholder="在此编写提示词模板…&#10;&#10;提示：用 {花括号} 标记需要替换的变量"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelAdd">取消</button>
      <button class="btn-save" id="saveTemplate">保存模板</button>
    </div>
  </div>
</div>

<script>
// Default prompts
const defaultPrompts = [
  {cat:'listing',title:'跨境商品Listing生成（多平台）',scene:'日常高频',desc:'输入产品基础信息，一键生成适配Amazon/Shopee/Lazada的Listing文案',
   template:'你是一名资深的跨境电商运营专家，擅长撰写高转化率的商品Listing文案。\n\n【产品信息】\n产品名称：{填写产品名称}\n核心卖点：{列出3-5个卖点，每条一行}\n目标客群：{描述目标用户画像}\n价格区间：{填写价格范围}\n竞品链接：{可选，填写竞品ASIN或URL}\n\n【生成要求】\n1. 标题：符合{平台名称}规范，包含核心关键词，突出差异化卖点，字符数控制在{平台字符限制}以内\n2. 五点描述：每点聚焦一个卖点，使用场景化语言，让用户能想象使用效果\n3. 搜索关键词：列出15-20个相关搜索词，按相关性排序\n4. A+页面文案：提供模块化文案框架\n\n【格式要求】\n- 输出时标注每个模块的字符数\n- 如有字数超出平台限制，给出删减建议\n- 最后附上该Listing的差异化竞争优势总结',
   tags:['Listing','多平台','日常高频','P0']},
  {cat:'listing',title:'Listing标题A/B测试变体生成',scene:'优化迭代',desc:'基于现有标题生成多个测试变体，用于A/B测试提升点击率',
   template:'你是一位Listing优化专家。请基于以下原始标题，生成5个优化变体。\n\n【原始标题】\n{粘贴现有标题}\n\n【产品核心关键词】\n{列出3-5个必须包含的关键词}\n\n【优化方向】\n- 变体1-2：强调性价比\n- 变体3-4：强调品质/材质\n- 变体5：制造紧迫感/社交证明\n\n【要求】\n1. 每个变体字符数不超过平台限制（Amazon: 200字符）\n2. 保留所有核心关键词\n3. 标注每个变体的侧重点和预期点击率提升预估\n4. 推荐最佳变体并说明理由',
   tags:['Listing','A/B测试','优化']},
  {cat:'listing',title:'差评分析 → Listing改进',scene:'质量优化',desc:'分析产品差评，反推Listing中需要优化的描述点',
   template:'分析以下差评内容，找出Listing描述与用户实际期望之间的差距，并给出Listing优化建议。\n\n【差评内容】\n{粘贴近30天的1-3星差评，每条用---分隔}\n\n【当前Listing描述】\n{粘贴当前Listing标题+五点描述}\n\n【分析输出】\n1. 差评关键词提取：高频出现的负面词汇\n2. 期望落差分析：用户期望 vs 实际收到的差距在哪里\n3. Listing修改建议：具体到哪个Bullet Point需要如何修改\n4. 预防性描述：在Listing中增加什么说明可以减少此类差评',
   tags:['Listing','差评分析','质量优化']},
  {cat:'data',title:'运营数据周报生成',scene:'周报输出',desc:'输入原始数据，自动生成结构化周报和分析洞察',
   template:'你是一名跨境电商数据分析师。请基于以下数据生成一份运营周报。\n\n【原始数据】\n销售额：{填写}\n订单量：{填写}\n客单价：{填写}\n广告花费：{填写}\n广告销售额：{填写}\n退货率：{填写}\nTop 3 ASIN及销售额：{填写}\n环比变化：{与上周对比的关键数据}\n\n【报告结构】\n1. 核心指标概览（3-5个关键数字，用📊呈现）\n2. 本周亮点（1-2个正面变化）\n3. 需要关注的问题（1-2个风险点）\n4. 广告效率分析（ACOS变化趋势）\n5. 下周行动建议（2-3条可执行的建议）\n\n【要求】\n- 语言简洁，一页纸能看完\n- 数据异常处标注可能原因\n- 每条建议都要有明确的负责人和截止时间',
   tags:['数据','周报','PPT素材']},
  {cat:'data',title:'广告关键词效果分析',scene:'广告优化',desc:'分析广告搜索词报告，给出关键词优化策略',
   template:'分析以下广告搜索词报告数据，给出关键词优化建议。\n\n【数据表格】\n{粘贴Search Term Report，包含：搜索词、曝光、点击、花费、销售额、ACOS}\n\n【分析维度】\n1. 高转化词（ACOS<目标值且出单>5）：建议提升竞价或设为精准匹配\n2. 花钱不转化词（花费>$X且0订单）：建议否定\n3. 长尾机会词（低曝光但高转化）：建议单独建组测试\n4. 品牌词表现：检查是否被竞品截流\n\n【输出格式】\n| 搜索词 | 当前表现 | 建议操作 | 预期影响 |\n每类至少给出3个具体关键词的操作建议',
   tags:['数据','广告','PPC优化']},
  {cat:'customer',title:'差评回复模板生成',scene:'客户维护',desc:'根据差评内容生成专业、得体的回复模板',
   template:'你是一位经验丰富的跨境电商客服主管。请根据以下差评内容，生成3种风格的回复模板。\n\n【差评内容】\n{粘贴客户差评原文}\n\n【产品信息】\n产品名：{填写}\n使用场景：{填写}\n\n【回复要求】\n版本A-标准专业型：表达歉意 + 解释可能原因 + 提供解决方案\n版本B-温暖共情型：共情理解 + 主动关心 + 超出预期的补偿方案\n版本C-简洁高效型：直接提供解决方案 + 引导站内信联系\n\n【注意事项】\n- 不出现"退款"等敏感词（防Amazon判定操纵评论）\n- 引导客户通过站内信联系\n- 英文回复需语法正确、语气自然\n- 每个版本标注适用场景',
   tags:['客户沟通','差评回复','客服SOP']},
  {cat:'customer',title:'客户咨询FAQ批量生成',scene:'效率提升',desc:'根据产品信息和常见问题，批量生成FAQ话术库',
   template:'基于以下产品信息，生成一份英文FAQ话术库。\n\n【产品信息】\n名称：{填写}\n品类：{填写}\n主要功能：{列出}\n常见售后问题：{列出3-5个}\n\n【FAQ结构】\n每个FAQ包含：\nQ: {客户常见问题，用自然的口语表达}\nA: {专业且友好的回答，2-4句话}\nTags: {问题分类标签}\n\n请生成至少10条FAQ，覆盖：\n- 产品使用类（3条）\n- 物流时效类（2条）\n- 退换货政策类（2条）\n- 产品对比类（2条）\n- 促销优惠类（1条）',
   tags:['客户沟通','FAQ','效率工具']},
  {cat:'research',title:'竞品Listing分析报告',scene:'新品立项',desc:'分析竞品Listing结构，找出可借鉴的优化方向',
   template:'你是一位跨境电商市场分析师。请对以下竞品Listing进行结构化分析。\n\n【竞品链接/ASIN】\n{填写3-5个竞品ASIN}\n\n【分析维度】\n1. 标题结构拆解：品牌词+核心词+属性词+场景词 的布局方式\n2. 五点描述策略：每个竞品的Bullet Points分别侧重什么\n3. 图片策略：主图风格、附图类型\n4. 定价策略：价格区间、是否有Coupon、与我们的价格对比\n5. 评论分析：高频好评关键词 + 高频差评关键词\n6. A+页面/EBC：内容模块结构、视觉风格\n\n【输出要求】\n- 用表格横向对比\n- 标注我们可以借鉴的3个最佳实践\n- 标注竞品的3个可攻击弱点',
   tags:['竞品调研','新品','策略分析']},
  {cat:'research',title:'市场趋势与选品灵感',scene:'选品决策',desc:'基于关键词趋势和平台数据，发现选品机会',
   template:'你是一位跨境电商选品专家。请根据以下信息分析市场机会。\n\n【目标市场】{美国/欧洲/日本/东南亚}\n【目标品类】{填写品类}\n【预算范围】$X-$X\n【参考关键词】{列出3-5个}\n\n【分析输出】\n1. 市场容量：近6个月搜索量趋势（上升/平稳/下降）\n2. 竞争格局：头部卖家集中度、新卖家进入难度\n3. 季节性：是否有明显淡旺季\n4. 差异化机会：目前市场上的空白点或可改进方向\n5. 风险提示：专利/合规/物流方面的潜在风险\n6. 推荐切入点：基于以上分析，推荐3个可选方向，附理由',
   tags:['竞品调研','选品','市场分析']},
  {cat:'process',title:'SOP流程图生成',scene:'流程标准化',desc:'输入工作步骤，自动生成标准化SOP流程文档',

// Load custom templates from localStorage
function loadCustomTemplates(){
  try{return JSON.parse(localStorage.getItem('customPrompts')||'[]');}catch(e){return[];}
}
function saveCustomTemplates(arr){
  localStorage.setItem('customPrompts',JSON.stringify(arr));
}

// Merge default + custom
function getAllPrompts(){
  return [...defaultPrompts, ...loadCustomTemplates().map(p=>({...p,custom:true}))];
}

let currentCat='all';

// Render
function render(cat='all'){
  currentCat=cat;
  const list=document.getElementById('promptList');
  const all=getAllPrompts();
  const items=cat==='all'?all:all.filter(p=>p.cat===cat);

  if(items.length===0){
    list.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>该版块暂无模板<br><small>点击右上角 + 添加自定义模板</small></p></div>`;
    return;
  }

  list.innerHTML=items.map((p,i)=>{
    const isCustom=p.custom||false;
    const idx=i;
    return `
    <div class="prompt-card" data-cat="${p.cat}">
      <div class="prompt-header">
        <div class="prompt-title">${p.title}${isCustom?'<span class="custom-badge">自定义</span>':''}</div>
        <span class="prompt-scene">${p.scene}</span>
      </div>
      <div class="prompt-desc">${p.desc}</div>
      <div class="prompt-content" style="position:relative">
        <button class="copy-btn" data-idx="${idx}" data-cat="${p.cat}">📋 复制</button>
        ${isCustom?`<button class="del-btn" data-idx="${idx}" data-cat="${p.cat}">🗑 删除</button>`:''}
        ${escapeHTML(p.template)}
      </div>
      <div class="prompt-tags">${p.tags.map(t=>`<span class="ptag">#${t}</span>`).join(' ')}</div>
    </div>`;
  }).join('');

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      const idx=parseInt(this.dataset.idx);
      const cat=this.dataset.cat;
      const items2=cat==='all'?getAllPrompts():getAllPrompts().filter(p=>p.cat===cat);
      const item=items2[idx];if(!item)return;
      navigator.clipboard.writeText(item.template).then(()=>{
        this.textContent='✅ 已复制';this.classList.add('copied');
        setTimeout(()=>{this.textContent='📋 复制';this.classList.remove('copied')},2000);
      }).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=item.template;document.body.appendChild(ta);
        ta.select();document.execCommand('copy');document.body.removeChild(ta);
        this.textContent='✅ 已复制';this.classList.add('copied');
        setTimeout(()=>{this.textContent='📋 复制';this.classList.remove('copied')},2000);
      });
    });
  });

  // Delete buttons (custom only)
  document.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      const idx=parseInt(this.dataset.idx);
      const cat=this.dataset.cat;
      const items2=cat==='all'?getAllPrompts():getAllPrompts().filter(p=>p.cat===cat);
      const item=items2[idx];if(!item)return;
      if(confirm(`确定删除模板「${item.title}」吗？此操作不可恢复。`)){
        const customs=loadCustomTemplates();
        const newCustoms=customs.filter(c=>c.title!==item.title||c.template!==item.template);
        saveCustomTemplates(newCustoms);
        render(currentCat);
      }
    });
  });
}

function escapeHTML(str){
  const div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

// Category tabs
document.querySelectorAll('.cat-tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    render(this.dataset.cat);
  });
});

// === Add Template Modal ===
const addModal=document.getElementById('addModal');
document.getElementById('addTemplateBtn').addEventListener('click',()=>addModal.classList.add('open'));
document.getElementById('closeModal').addEventListener('click',()=>addModal.classList.remove('open'));
document.getElementById('cancelAdd').addEventListener('click',()=>addModal.classList.remove('open'));
addModal.addEventListener('click',function(e){if(e.target===addModal)addModal.classList.remove('open')});
document.addEventListener('keydown',function(e){if(e.key==='Escape')addModal.classList.remove('open')});

document.getElementById('saveTemplate').addEventListener('click',function(){
  const cat=document.getElementById('tmplCat').value;
  const title=document.getElementById('tmplTitle').value.trim();
  const scene=document.getElementById('tmplScene').value.trim();
  const desc=document.getElementById('tmplDesc').value.trim();
  const content=document.getElementById('tmplContent').value.trim();
  if(!title||!content){alert('请至少填写模板标题和模板内容');return;}

  const customs=loadCustomTemplates();
  customs.push({
    cat:cat,
    title:title,
    scene:scene||'自定义',
    desc:desc||'自定义模板',
    template:content,
    tags:['自定义']
  });
  saveCustomTemplates(customs);

  // Reset form
  document.getElementById('tmplTitle').value='';
  document.getElementById('tmplScene').value='';
  document.getElementById('tmplDesc').value='';
  document.getElementById('tmplContent').value='';
  addModal.classList.remove('open');

  // Switch to the category of the new template and re-render
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  const targetTab=document.querySelector(`.cat-tab[data-cat="${cat}"]`);
  if(targetTab)targetTab.classList.add('active');
  else document.querySelector('.cat-tab[data-cat="all"]').classList.add('active');
  render(cat);
  document.getElementById('promptList').scrollIntoView({behavior:'smooth'});
});

// === Mobile/Desktop Toggle ===
let isMobile=false;
document.getElementById('toggleView').addEventListener('click',function(){
  isMobile=!isMobile;
  if(isMobile){
    document.body.classList.add('mobile-view');
    this.innerHTML='💻 桌面视图';
    this.style.background='#2c2c28';
    this.style.color='#fff';
    this.style.borderColor='#2c2c28';
  }else{
    document.body.classList.remove('mobile-view');
    this.innerHTML='📱 手机视图';
    this.style.background='';
    this.style.color='';
    this.style.borderColor='';
  }
});

// Init
render();
</script>
